apiVersion: v1
kind: ConfigMap
metadata:
  name: database-config
  namespace: todo
data:
  DB_USER: postgres
  DB_HOST: postgres-service
  DB_PORT: "5432"
  DB_NAME: tododb
---
apiVersion: v1
kind: Secret
metadata:
  name: database-secret
  namespace: todo
type: Opaque
stringData:
  DB_PASSWORD: postgres  # Change this to a secure password!
