{% extends 'base.html' %}

{% block header %}
  <h1>{% block title %}Tasks{% endblock %}</h1>
  <a class="action" href="{{ url_for('tasks.create') }}">New</a>
{% endblock %}

{% block content %}
  {% for task in tasks %}
    <article class="task">
      <header>
        <div>
          <h1>{{ task['task'] }}</h1>
          <div class="about">on {{ task['created'].strftime('%Y-%m-%d') }}</div>
        </div>
      </header>
    </article>
    {% if not loop.last %}
      <hr>
    {% endif %}
  {% endfor %}
{% endblock %}
