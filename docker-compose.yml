version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: todo-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tododb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ewazme/todo-backend:latest
    container_name: todo-backend
    ports:
      - "5000:5000"
    environment:
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: tododb
      FLASK_ENV: production
      INIT_DB: "true"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/flaskr:/app/flaskr

  frontend:
    image: ewazme/todo-frontend:latest
    container_name: todo-frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:5000
    depends_on:
      - backend

volumes:
  postgres_data:
